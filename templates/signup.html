<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | GolfWin</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body {
    background: linear-gradient(135deg, #020c1b, #000);
    color: #e6f1ff;
}

/* Card */
.signup-card {
    background: #112240;
    border: 1px solid #099d7a60;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(100,255,218,0.15);
    transition: 0.4s;
}
.signup-card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 30px rgba(100,255,218,0.4);
}

/* Button */
.btn-custom {
    background: #64ffda;
    color: black;
    font-weight: bold;
    transition: 0.3s;
}
.btn-custom:hover {
    background: #52e0c4;
    transform: scale(1.05);
}

/* Inputs */
.form-control, .form-select {
    background: #020c1b;
    color: white;
    border: 1px solid #64ffda;
}
.form-control:focus, .form-select:focus {
    box-shadow: 0 0 10px #64ffda;
    border-color: #64ffda;
}

/* Highlight */
.highlight {
    color: #64ffda;
}

/* Floating animation */
.float {
    animation: float 3s ease-in-out infinite;
}
@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}

/* Fade animation */
.fade-in {
    animation: fadeIn 1.5s ease-in-out;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Footer */
footer {
    color: #8892b0;
}
</style>

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100 fade-in">

    <div class="col-md-5">
        <div class="card signup-card p-4 animate__animated animate__zoomIn">

            <h2 class="text-center mb-3 float fw-bold" style="color:#0a192f; background:#64ffda; padding:10px; border-radius:8px;">
    Create <span style="color:#020c1b;">Account</span>
</h2>

           <p class="text-center mb-4" style="color:#a8b2d1;">
    Join GolfWin to track scores, win rewards, and support charities.
</p>

            <form>

                <!-- Name -->
                <div class="mb-3">
                    <label class="form-label text-info">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label text-info">Email address</label>
                    <input type="email" class="form-control" placeholder="Enter email" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label text-info">Password</label>
                    <input type="password" class="form-control" placeholder="Create password" required>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label class="form-label text-info">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm password" required>
                </div>

                <!-- Charity Selection -->
                <div class="mb-3">
                    <label class="form-label text-info">Select Charity</label>
                    <select class="form-select">
                        <option>Education Fund</option>
                        <option>Healthcare Support</option>
                        <option>Child Welfare</option>
                    </select>
                </div>

                <!-- Contribution -->
                <div class="mb-3">
                    <label class="form-label text-info">Contribution (%)</label>
                    <input type="number" class="form-control" placeholder="Minimum 10%">
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-custom w-100 mt-2">
                    Sign Up
                </button>

                <!-- Login Link -->
                <p class="text-center mt-3">
                    Already have an account?
                    <a href="#" class="text-info fw-bold">Login</a>
                </p>

            </form>

        </div>
    </div>

</div>

<!-- Footer -->
<footer class="text-center mt-4">
    <p>© 2026 Digital Heroes</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
